<!DOCTYPE html>
<html>
<head>
    <title>Clear Questions Cache</title>
</head>
<body>
    <h1>Smazání cache otázek</h1>
    <p>Klikni na tlačítko pro smazání localStorage cache:</p>
    <button onclick="clearCache()">Smazat cache otázek</button>
    <p id="result"></p>
    
    <script>
        function clearCache() {
            const before = localStorage.getItem('questions');
            if (before) {
                const count = JSON.parse(before).length;
                localStorage.removeItem('questions');
                document.getElementById('result').innerHTML = 
                    `✅ Smazáno ${count} otázek z cache.<br>Obnov stránku Aeropilotu (Ctrl+R) pro načtení nových dat.`;
            } else {
                document.getElementById('result').innerHTML = 
                    `ℹ️ Cache byla prázdná. Obnov stránku Aeropilotu.`;
            }
        }
    </script>
</body>
</html>
